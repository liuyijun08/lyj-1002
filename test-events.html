<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>事件委托测试 - 可复跑</title>
<link rel="stylesheet" href="style.css">
<style>
    .test-result { padding: 20px; max-width: 900px; margin: 0 auto; font-family: system-ui, sans-serif; }
    .test-result h1 { color: #333; }
    .test-summary { padding: 16px; border-radius: 8px; margin: 16px 0; font-weight: bold; font-size: 18px; }
    .test-summary.pass { background: #e6f7e6; color: #2d7a2d; border: 2px solid #4caf50; }
    .test-summary.fail { background: #fde8e8; color: #c0392b; border: 2px solid #e74c3c; }
    .test-case { border: 1px solid #ddd; border-radius: 8px; margin: 12px 0; padding: 12px 16px; }
    .test-case h3 { margin: 0 0 8px 0; font-size: 16px; }
    .test-case.pass { background: #f5fff5; border-color: #90EE90; }
    .test-case.fail { background: #fff5f5; border-color: #f5a0a0; }
    .test-detail { font-size: 14px; color: #555; margin: 6px 0; }
    .test-detail .expected { color: #2d7a2d; }
    .test-detail .actual { color: #c0392b; }
    .run-btn { padding: 12px 24px; font-size: 16px; background: #2196F3; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .run-btn:hover { background: #1976D2; }
    .run-btn:disabled { background: #ccc; cursor: not-allowed; }
    .test-dom-area { border: 2px dashed #aaa; border-radius: 8px; padding: 16px; margin: 16px 0; background: #fafafa; }
    .test-dom-area h4 { margin: 0 0 12px 0; color: #666; }
    .hidden-test { display: none; }
    .stats-row { display: flex; gap: 20px; margin: 8px 0; font-size: 14px; }
    .stats-row span { color: #888; }
    .stats-row strong { color: #333; }
</style>
</head>
<body>
<div id="app">
    <div id="menu" class="screen active">
        <div class="test-result">
            <h1>🧪 事件委托单触发测试</h1>
            <p>测试目标：验证多次调用 bindAll 后，每个事件委托处理器只触发一次</p>
            <div class="stats-row">
                <span>bindAll 调用次数：<strong id="stat-bindall-count">0</strong></span>
                <span>总测试用例：<strong id="stat-total">0</strong></span>
                <span>通过：<strong id="stat-pass">0</strong></span>
                <span>失败：<strong id="stat-fail">0</strong></span>
            </div>
            <button id="btn-run-tests" class="run-btn">▶ 运行测试</button>
            <button id="btn-run-tests-5x" class="run-btn" style="background:#FF9800;margin-left:8px;">🔁 连续运行5次</button>
            <div id="test-summary" class="test-summary" style="display:none;"></div>
            <div id="test-results"></div>

            <div class="test-dom-area">
                <h4>📦 测试 DOM 区域（用于事件委托目标）</h4>

                <div id="test-level-list" class="order-list hidden-test">
                    <div class="order-card" data-level-id="1">
                        <div class="order-info">
                            <div class="order-name">测试订单 1</div>
                            <button class="accept-order-btn" data-level-id="1">接单</button>
                        </div>
                    </div>
                </div>

                <div id="test-review-tabs" class="review-tabs hidden-test">
                    <button class="review-tab active" data-filter="all">全部</button>
                    <button class="review-tab" data-filter="good">好评</button>
                </div>

                <div id="test-inv-tabs" class="inventory-tabs hidden-test">
                    <button class="inv-tab active" data-category="all">全部</button>
                    <button class="inv-tab" data-category="vegetable">蔬菜</button>
                </div>

                <div id="test-titles-list" class="titles-list hidden-test">
                    <div class="title-badge available" data-ach-id="title1">测试称号</div>
                </div>

                <div id="test-chef-cards" class="chef-cards hidden-test">
                    <div class="chef-card" data-chef-id="chef1">
                        <div class="chef-name">测试厨师</div>
                        <button class="chef-assign-btn" data-chef-id="chef1">值班</button>
                        <button class="chef-rest-btn" data-chef-id="chef1">休息</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="game.js"></script>
<script src="test-events.js"></script>
</body>
</html>
